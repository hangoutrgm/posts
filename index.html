<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hangout Posts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: {} } }
        if (localStorage.theme === 'light') document.documentElement.classList.remove('dark');
        else document.documentElement.classList.add('dark');
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .reply-line { border-left: 2px solid rgba(156, 163, 175, 0.2); }
    </style>
</head>
<body class="min-h-screen bg-gray-100 text-gray-900 dark:bg-[#0b1120] dark:text-[#f8fafc] transition-colors duration-300">

    <nav class="sticky top-0 z-50 px-3 py-2 flex justify-between items-center bg-white/90 dark:bg-slate-900/90 backdrop-blur-md shadow-sm border-b border-gray-200 dark:border-slate-800">
        <div class="flex items-center space-x-2 truncate cursor-pointer" onclick="window.closeProfile()">
            <i class="fa-solid fa-gamepad text-blue-500 text-lg"></i>
            <h1 class="text-base md:text-lg font-bold tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-purple-600 truncate">Hangout Posts</h1>
            <div class="ml-2 flex items-center bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400 px-2 py-0.5 rounded-full text-[10px] font-bold border border-green-200 dark:border-green-800/50">
                <div class="w-1.5 h-1.5 bg-green-500 rounded-full mr-1 animate-pulse"></div>
                <span id="online-count">0</span>
            </div>
        </div>
        
        <div class="flex items-center space-x-2">
            <button onclick="document.getElementById('members-modal').classList.remove('hidden'); window.renderMembers();" class="p-1.5 text-gray-500 hover:text-blue-500 transition"><i class="fa-solid fa-users"></i></button>
            <button id="theme-toggle" class="p-1.5 text-gray-500 hover:text-blue-500 transition"><i class="fa-solid fa-moon dark:hidden"></i><i class="fa-solid fa-sun hidden dark:block"></i></button>
            <div id="auth-container">
                <button id="open-login-btn" class="bg-blue-600 text-white px-3 py-1 rounded-full text-xs font-semibold shadow-md">Login</button>
                <div id="user-info" class="hidden flex items-center space-x-2">
                    <button onclick="window.openEditProfile()" class="hover:opacity-80 transition">
                        <img id="nav-avatar" class="w-7 h-7 rounded-full border border-blue-500 object-cover" src="">
                    </button>
                    <button id="logout-btn" class="text-gray-400 hover:text-red-500 p-1"><i class="fa-solid fa-right-from-bracket"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <div class="w-full max-w-2xl mx-auto mt-2 px-2 pb-24 relative">

        <main id="main-view" class="block">
            
            <div class="mb-2 relative">
                <i class="fa-solid fa-search absolute left-3 top-2.5 text-gray-400 text-sm"></i>
                <input type="text" id="post-search" oninput="window.renderFeed()" placeholder="Search posts or authors..." class="w-full bg-white dark:bg-slate-800 text-sm pl-9 pr-3 py-2 rounded-lg dark:text-white focus:outline-none shadow-sm border border-gray-200 dark:border-slate-700">
            </div>

            <div class="flex space-x-1.5 overflow-x-auto scrollbar-hide py-1.5 mb-2 snap-x text-xs" id="category-filters">
                <button class="filter-btn active snap-start bg-blue-600 text-white px-3 py-1 rounded-full font-semibold whitespace-nowrap shadow-sm" data-cat="All">All</button>
                <button class="filter-btn snap-start bg-gray-200 text-gray-700 dark:bg-slate-800 dark:text-gray-300 px-3 py-1 rounded-full whitespace-nowrap" data-cat="My Posts">👤 My Posts</button>
                <button class="filter-btn snap-start bg-gray-200 text-gray-700 dark:bg-slate-800 dark:text-gray-300 px-3 py-1 rounded-full whitespace-nowrap" data-cat="General">General</button>
                <button class="filter-btn snap-start bg-gray-200 text-gray-700 dark:bg-slate-800 dark:text-gray-300 px-3 py-1 rounded-full whitespace-nowrap" data-cat="Contests">🏆 Contests</button>
                <button class="filter-btn snap-start bg-gray-200 text-gray-700 dark:bg-slate-800 dark:text-gray-300 px-3 py-1 rounded-full whitespace-nowrap" data-cat="Announcements">📢 Announcements</button>
                <button class="filter-btn snap-start bg-gray-200 text-gray-700 dark:bg-slate-800 dark:text-gray-300 px-3 py-1 rounded-full whitespace-nowrap" data-cat="Rules">📜 Rules</button>
            </div>

            <div id="create-post-box" class="hidden bg-white dark:bg-slate-800 rounded-xl p-3 mb-4 shadow-sm border border-gray-200 dark:border-slate-700">
                <textarea id="post-text" class="w-full bg-gray-50 dark:bg-slate-900 text-gray-900 dark:text-white rounded-lg p-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 resize-none" rows="2" placeholder="Share something..."></textarea>
                
                <div class="flex items-center space-x-2 mt-2">
                    <label class="cursor-pointer text-gray-500 hover:text-blue-500 transition p-1.5 bg-gray-100 dark:bg-slate-700 rounded-lg shrink-0 border border-gray-200 dark:border-slate-600">
                        <i class="fa-solid fa-image text-lg"></i>
                        <input type="file" id="post-image-file" accept="image/*" class="hidden" onchange="document.getElementById('file-name').innerText = this.files[0] ? this.files[0].name : ''">
                    </label>
                    <input type="text" id="post-image-url" class="flex-1 bg-gray-50 dark:bg-slate-900 text-[11px] text-gray-700 dark:text-gray-300 rounded-lg p-2 focus:outline-none border border-gray-100 dark:border-slate-700 focus:border-blue-500" placeholder="Or paste image URL...">
                </div>
                <div id="file-name" class="text-[9px] text-blue-500 truncate mt-1 font-bold px-1"></div>

                <div class="flex justify-between items-center mt-2 pt-2 border-t border-gray-100 dark:border-slate-700">
                    <select id="post-category" class="bg-gray-100 dark:bg-slate-700 text-gray-700 dark:text-gray-300 text-xs rounded p-1 focus:outline-none">
                        <option value="General">General</option>
                        <option value="Contests">🏆 Contests</option>
                        <option value="Announcements" class="mod-only hidden">📢 Announcements (Mod+)</option>
                        <option value="Rules" class="mod-only hidden">📜 Rules (Mod+)</option>
                    </select>
                    <button id="submit-post-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-1.5 rounded-full text-xs font-bold shadow-sm transition">Post</button>
                </div>
            </div>

            <div id="feed" class="space-y-3"></div>
        </main>

        <main id="profile-view" class="hidden">
            <button onclick="window.closeProfile()" class="mb-3 text-xs font-bold text-gray-500 hover:text-blue-500 transition flex items-center"><i class="fa-solid fa-arrow-left mr-1"></i> Back to Feed</button>
            <div id="profile-header"></div>
            <div class="flex items-center space-x-2 mb-3 mt-4">
                <i class="fa-solid fa-layer-group text-blue-500"></i><h2 class="font-bold dark:text-white text-sm">Posts</h2>
            </div>
            <div id="profile-feed" class="space-y-3"></div>
        </main>
    </div>

    <div id="members-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-800 rounded-xl w-full max-w-md p-5 shadow-2xl relative border border-gray-200 dark:border-slate-700 max-h-[85vh] flex flex-col">
            <button onclick="document.getElementById('members-modal').classList.add('hidden')" class="absolute top-3 right-3 text-gray-400 hover:text-gray-200"><i class="fa-solid fa-xmark"></i></button>
            <h2 class="text-lg font-bold mb-3 dark:text-white flex items-center"><i class="fa-solid fa-users mr-2 text-blue-500"></i> Community Members</h2>
            <div class="mb-3 relative shrink-0">
                <i class="fa-solid fa-search absolute left-3 top-2.5 text-gray-400 text-sm"></i>
                <input type="text" id="member-search" oninput="window.renderMembers()" placeholder="Search members..." class="w-full bg-gray-100 dark:bg-slate-900 text-sm pl-9 pr-3 py-2 rounded-lg dark:text-white focus:outline-none border border-gray-200 dark:border-slate-700">
            </div>
            <div id="members-list" class="flex-1 overflow-y-auto space-y-2 pr-2 scrollbar-hide"></div>
        </div>
    </div>

    <div id="profile-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-800 rounded-xl w-full max-w-xs p-5 shadow-2xl relative border border-gray-200 dark:border-slate-700">
            <button onclick="document.getElementById('profile-modal').classList.add('hidden')" class="absolute top-3 right-3 text-gray-400"><i class="fa-solid fa-xmark"></i></button>
            <h2 class="text-lg font-bold mb-3 dark:text-white text-center">Edit Profile</h2>
            
            <div class="flex justify-center mb-1">
                <img id="profile-preview" class="w-16 h-16 rounded-full border-2 border-blue-500 object-cover bg-gray-100 dark:bg-slate-700">
            </div>
            
            <label class="block text-center mb-3 cursor-pointer text-blue-500 text-xs font-bold hover:underline">
                <i class="fa-solid fa-camera mr-1"></i> Upload Picture
                <input type="file" id="profile-pic-file" accept="image/*" class="hidden" onchange="
                    const file = this.files[0];
                    if(file) {
                        const reader = new FileReader();
                        reader.onload = function(e) { document.getElementById('profile-preview').src = e.target.result; }
                        reader.readAsDataURL(file);
                    }
                ">
            </label>

            <input type="text" id="profile-name" placeholder="Display Name" class="w-full bg-gray-100 dark:bg-slate-900 text-sm p-2.5 rounded-lg mb-2 dark:text-white focus:outline-none">
            <input type="text" id="profile-pic-url" placeholder="Profile Pic URL (Optional)" class="w-full bg-gray-100 dark:bg-slate-900 text-[10px] p-2.5 rounded-lg mb-4 dark:text-white focus:outline-none">
            
            <button id="view-profile-btn" class="w-full bg-gray-200 dark:bg-slate-700 text-gray-800 dark:text-white font-bold p-2 rounded-lg text-sm mb-2 shadow-sm border border-gray-300 dark:border-slate-600 transition hover:bg-gray-300 dark:hover:bg-slate-600"><i class="fa-regular fa-user mr-1"></i> View My Profile</button>
            
            <button id="save-profile-btn" class="w-full bg-blue-600 text-white font-bold p-2 rounded-lg text-sm shadow-md transition hover:bg-blue-500">Save Changes</button>
        </div>
    </div>

    <div id="auth-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-800 rounded-xl w-full max-w-sm p-5 shadow-2xl relative border border-gray-200 dark:border-slate-700">
            <button onclick="document.getElementById('auth-modal').classList.add('hidden')" class="absolute top-3 right-3 text-gray-400"><i class="fa-solid fa-xmark"></i></button>
            <h2 class="text-lg font-bold mb-4 text-center dark:text-white" id="auth-title">Join Hangout</h2>
            <div id="email-form" class="space-y-2">
                <input type="email" id="auth-email" placeholder="Email" class="w-full bg-gray-100 dark:bg-slate-900 text-sm p-2.5 rounded-lg dark:text-white focus:outline-none">
                <input type="password" id="auth-password" placeholder="Password" class="w-full bg-gray-100 dark:bg-slate-900 text-sm p-2.5 rounded-lg dark:text-white focus:outline-none">
                <button id="auth-action-btn" class="w-full bg-blue-600 text-white font-bold p-2.5 rounded-lg text-sm shadow-md mt-1">Sign In</button>
                <div class="text-center text-xs text-gray-500 mt-1"><span id="auth-toggle-text">Need an account?</span> <button id="auth-toggle-btn" class="text-blue-500 font-bold ml-1">Sign Up</button></div>
            </div>
            <div class="my-3 flex items-center"><div class="flex-grow border-t border-gray-200 dark:border-slate-600"></div><span class="mx-2 text-[10px] text-gray-400">OR</span><div class="flex-grow border-t border-gray-200 dark:border-slate-600"></div></div>
            <button id="guest-login-btn" class="w-full bg-gray-200 dark:bg-slate-700 text-gray-800 dark:text-gray-200 font-bold p-2.5 rounded-lg text-sm hover:bg-gray-300 transition"><i class="fa-solid fa-user-secret mr-1"></i> Login as Guest</button>
            <p id="auth-error" class="text-red-500 text-xs text-center mt-2 hidden"></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, push, onValue, set, update, remove, serverTimestamp, increment, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // ==========================================
        // 1. CONFIGURATION
        // ==========================================
        const firebaseConfig = {

  apiKey: "AIzaSyAEQxuQU23L269MOfZCRKaYO4rHZpDDlng",

  authDomain: "hangoutposts.firebaseapp.com",

  databaseURL: "https://hangoutposts-default-rtdb.asia-southeast1.firebasedatabase.app",

  projectId: "hangoutposts",

  storageBucket: "hangoutposts.firebasestorage.app",

  messagingSenderId: "622286344359",

  appId: "1:622286344359:web:6d2fc33137ea0422be0b82",

  measurementId: "G-4G3FCMJNG5"

}; 
        const ADMIN_UIDS = ["IYNhNTCcCsZQSGad3hu9rar0ILC3"]; 

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // State Variables
        let currentUser = null;
        let currentFilter = "All";
        let allPosts = [];
        let globalUsersCache = {};
        let onlineUsers = {}; 
        let isSignUpMode = false;
        let activeProfileUid = null; 

        // Deep Link Initial Scroll Tracker
        window.initialScrollDone = false;

        // UI State Trackers for Replies
        window.openComments = new Set();
        window.openReplies = new Set();

        let deviceId = localStorage.getItem('hangout_device_id') || ('dev_' + Math.random().toString(36).substring(2, 15));
        localStorage.setItem('hangout_device_id', deviceId);

        // ==========================================
        // HELPER FUNCTIONS & HIERARCHY
        // ==========================================
        window.generateAvatar = (seed) => `https://api.dicebear.com/7.x/bottts/svg?seed=${seed}&backgroundColor=transparent`;
        
        window.getRole = function(uid) {
            if (uid && ADMIN_UIDS.includes(uid)) return { title: 'Admin', level: 3, badgeHtml: `<span class="bg-red-500/20 text-red-500 dark:text-red-400 border border-red-500/30 text-[9px] px-1.5 py-0 rounded uppercase font-bold ml-1">Admin</span>` };
            if (uid && globalUsersCache[uid]?.isMod === true) return { title: 'Mod', level: 2, badgeHtml: `<span class="bg-purple-500/20 text-purple-600 dark:text-purple-400 border border-purple-500/30 text-[9px] px-1.5 py-0 rounded uppercase font-bold ml-1">Mod</span>` };
            return { title: 'Member', level: 1, badgeHtml: `` }; 
        };

        window.canDelete = function(targetUid) {
            if(!currentUser) return false;
            if(currentUser.uid === targetUid) return true; 
            return window.getRole(currentUser.uid).level > window.getRole(targetUid).level;
        };

        window.checkBan = function() {
            if (globalUsersCache[currentUser?.uid]?.isBanned) {
                alert("Your account has been banned from interacting by a Moderator.");
                return true;
            }
            return false;
        };

        window.copyPostLink = function(postId) {
            const url = window.location.origin + window.location.pathname + '?post=' + postId;
            navigator.clipboard.writeText(url).then(() => alert("Post link copied to clipboard!"));
        };

        window.openProfile = (uid) => {
            document.getElementById('members-modal').classList.add('hidden');
            document.getElementById('main-view').classList.add('hidden');
            document.getElementById('profile-view').classList.remove('hidden');
            activeProfileUid = uid;
            window.renderProfileData();
            window.scrollTo(0,0);
        };

        window.closeProfile = () => {
            document.getElementById('profile-view').classList.add('hidden');
            document.getElementById('main-view').classList.remove('hidden');
            activeProfileUid = null;
            window.renderFeed();
        };

        // V3.2.2 FIX: Pre-fill the profile modal with current DB info when opening
        window.openEditProfile = () => {
            if(!currentUser) return;
            const cache = globalUsersCache[currentUser.uid] || {};
            document.getElementById('profile-name').value = cache.name || currentUser.displayName || '';
            document.getElementById('profile-preview').src = cache.pic || currentUser.photoURL || window.generateAvatar(currentUser.uid);
            document.getElementById('profile-pic-url').value = '';
            document.getElementById('profile-pic-file').value = '';
            document.getElementById('profile-modal').classList.remove('hidden');
        };

        window.compressImage = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_SIZE = 800;
                        let { width, height } = img;
                        if (width > height && width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } 
                        else if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7)); 
                    };
                    img.onerror = (err) => reject(err);
                };
                reader.onerror = (err) => reject(err);
            });
        };

        // ==========================================
        // PRESENCE & AUTHENTICATION
        // ==========================================
        onValue(ref(db, '.info/connected'), (snap) => {
            if (snap.val() === true && auth.currentUser) {
                const myPresenceRef = ref(db, `presence/${auth.currentUser.uid}`);
                onDisconnect(myPresenceRef).remove();
                set(myPresenceRef, true);
            }
        });
        
        onValue(ref(db, 'presence'), (snap) => {
            onlineUsers = snap.val() || {};
            document.getElementById('online-count').innerText = snap.size || 0;
            if(!document.getElementById('members-modal').classList.contains('hidden')) window.renderMembers();
            if(activeProfileUid) window.renderProfileData();
        });

        onValue(ref(db, 'users'), (snap) => {
            globalUsersCache = snap.val() || {};
            if(activeProfileUid) window.renderProfileData(); else window.renderFeed();
            if(!document.getElementById('members-modal').classList.contains('hidden')) window.renderMembers();
            
            // Keeps nav avatar correctly synced with database changes instantly
            if(currentUser && globalUsersCache[currentUser.uid]?.pic) {
                document.getElementById('nav-avatar').src = globalUsersCache[currentUser.uid].pic;
            }
        });

        document.getElementById('theme-toggle').addEventListener('click', () => {
            const html = document.documentElement; html.classList.toggle('dark');
            localStorage.theme = html.classList.contains('dark') ? 'dark' : 'light';
        });

        document.getElementById('open-login-btn').addEventListener('click', () => document.getElementById('auth-modal').classList.remove('hidden'));
        document.getElementById('auth-toggle-btn').addEventListener('click', () => {
            isSignUpMode = !isSignUpMode;
            document.getElementById('auth-action-btn').innerText = isSignUpMode ? "Create Account" : "Sign In";
            document.getElementById('auth-toggle-text').innerText = isSignUpMode ? "Already have an account?" : "Need an account?";
            document.getElementById('auth-toggle-btn').innerText = isSignUpMode ? "Sign In" : "Sign Up";
        });
        const showError = (msg) => { const errEl = document.getElementById('auth-error'); errEl.innerText = msg; errEl.classList.remove('hidden'); }

        document.getElementById('auth-action-btn').addEventListener('click', async () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-password').value;
            try {
                if (isSignUpMode) {
                    const cred = await createUserWithEmailAndPassword(auth, email, pass);
                    const newName = `User_${Math.floor(Math.random()*999)}`;
                    const newPic = window.generateAvatar(cred.user.uid);
                    await updateProfile(cred.user, { displayName: newName, photoURL: newPic });
                    
                    update(ref(db, `users/${cred.user.uid}`), { name: newName, pic: newPic });
                    document.getElementById('nav-avatar').src = newPic;
                } else await signInWithEmailAndPassword(auth, email, pass);
                document.getElementById('auth-modal').classList.add('hidden');
            } catch (error) { showError(error.message.replace('Firebase:', '')); }
        });

        document.getElementById('guest-login-btn').addEventListener('click', async () => {
            const guestEmail = `guest_${deviceId}@hangout.local`, guestPass = deviceId + "_secret";
            try { await signInWithEmailAndPassword(auth, guestEmail, guestPass); document.getElementById('auth-modal').classList.add('hidden'); } 
            catch {
                try {
                    const cred = await createUserWithEmailAndPassword(auth, guestEmail, guestPass);
                    const newName = `Guest_${Math.floor(Math.random()*999)}`;
                    const newPic = window.generateAvatar(cred.user.uid);
                    await updateProfile(cred.user, { displayName: newName, photoURL: newPic });
                    
                    update(ref(db, `users/${cred.user.uid}`), { name: newName, pic: newPic });
                    document.getElementById('nav-avatar').src = newPic;
                    document.getElementById('auth-modal').classList.add('hidden');
                } catch(e) { showError("Failed to create guest account."); }
            }
        });
        
        document.getElementById('logout-btn').addEventListener('click', () => { if(currentUser) remove(ref(db, `presence/${currentUser.uid}`)); signOut(auth); });

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                // V3.2.2 FIX: Stop aggressively overwriting the DB profile on page reload.
                // Firebase Auth rejects big base64 images, which meant a refresh would wipe out the picture in the database!
                update(ref(db, `users/${user.uid}`), { lastSeen: serverTimestamp() });
                
                const myPresenceRef = ref(db, `presence/${user.uid}`);
                onDisconnect(myPresenceRef).remove(); set(myPresenceRef, true);
                
                document.getElementById('open-login-btn').classList.add('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                
                if(!globalUsersCache[user.uid]?.isBanned) document.getElementById('create-post-box').classList.remove('hidden');
                
                if (globalUsersCache[user.uid]?.pic || user.photoURL) {
                    document.getElementById('nav-avatar').src = globalUsersCache[user.uid]?.pic || user.photoURL;
                }

                const role = window.getRole(user.uid);
                document.querySelectorAll('.mod-only').forEach(opt => {
                    if (role.level === 1) { opt.classList.add('hidden'); opt.disabled = true; }
                    else { opt.classList.remove('hidden'); opt.disabled = false; }
                });
                const catSelect = document.getElementById('post-category');
                if (role.level === 1 && (catSelect.value === 'Announcements' || catSelect.value === 'Rules')) catSelect.value = 'General';

            } else {
                document.getElementById('open-login-btn').classList.remove('hidden');
                document.getElementById('user-info').classList.add('hidden');
                document.getElementById('create-post-box').classList.add('hidden');
            }
            if(!activeProfileUid) window.renderFeed();
        });

        document.getElementById('view-profile-btn').addEventListener('click', () => {
            if(currentUser) {
                document.getElementById('profile-modal').classList.add('hidden');
                window.openProfile(currentUser.uid);
            }
        });

        // V3.2.2 FIX: Complete rewrite of Profile Save logic to guarantee it works even if you only change the picture
        document.getElementById('save-profile-btn').addEventListener('click', async () => {
            const newNameInput = document.getElementById('profile-name').value.trim();
            const cache = globalUsersCache[currentUser.uid] || {};
            
            // Fallback ensures if user leaves name blank while uploading a pic, their name stays the same!
            const finalName = newNameInput || cache.name || currentUser.displayName || `User_${Math.floor(Math.random()*999)}`;
            
            let newPicUrl = document.getElementById('profile-pic-url').value.trim();
            const fileInput = document.getElementById('profile-pic-file');
            const file = fileInput.files[0];
            
            const btn = document.getElementById('save-profile-btn');
            btn.innerText = "Saving..."; btn.disabled = true;

            let finalPic = newPicUrl;
            try {
                if(file) finalPic = await window.compressImage(file);
            } catch(e) { console.error("Compression failed", e); }
            
            // If they didn't upload a pic, keep the old pic!
            if(!finalPic) finalPic = cache.pic || currentUser.photoURL || window.generateAvatar(currentUser.uid);

            if(currentUser) {
                try {
                    // Update Database (Primary truth)
                    await update(ref(db, `users/${currentUser.uid}`), { name: finalName, pic: finalPic });
                    
                    // Update Auth (Try to update, ignore if string is too big for Auth limit)
                    try { await updateProfile(currentUser, { displayName: finalName, photoURL: finalPic }); } catch (e) { /* Expected for large images */ }
                    
                    document.getElementById('profile-modal').classList.add('hidden');
                    document.getElementById('nav-avatar').src = finalPic;
                    fileInput.value = '';
                    document.getElementById('profile-pic-url').value = '';
                } catch(error) {
                    alert("Error saving profile. Please try again.");
                }
            }
            btn.innerText = "Save Changes"; btn.disabled = false;
        });

        // ==========================================
        // CREATE POST
        // ==========================================
        document.getElementById('submit-post-btn').addEventListener('click', async () => {
            if (!currentUser) return document.getElementById('auth-modal').classList.remove('hidden');
            if (window.checkBan()) return; 
            
            const text = document.getElementById('post-text').value.trim();
            const fileInput = document.getElementById('post-image-file');
            const file = fileInput.files[0];
            let imgUrl = document.getElementById('post-image-url').value.trim();
            
            if (!text && !imgUrl && !file) return;
            
            const btn = document.getElementById('submit-post-btn');
            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
                let finalImage = imgUrl; 
                if (file) {
                    const today = new Date().toLocaleDateString('en-CA');
                    const userData = globalUsersCache[currentUser.uid] || {};
                    const uploadsToday = userData.uploadStats?.date === today ? userData.uploadStats.count : 0;
                    
                    if (uploadsToday >= 5) {
                        alert("You have reached your daily limit of 5 image uploads.");
                        btn.innerText = "Post"; btn.disabled = false; return;
                    }
                    
                    btn.innerText = "Compressing...";
                    finalImage = await window.compressImage(file);
                    update(ref(db, `users/${currentUser.uid}/uploadStats`), { date: today, count: increment(1) });
                }

                await set(push(ref(db, 'community_posts')), {
                    authorId: currentUser.uid, text: text, image: finalImage,
                    category: document.getElementById('post-category').value,
                    timestamp: serverTimestamp(), pinned: false, reactions: {}
                });
                
                document.getElementById('post-text').value = '';
                document.getElementById('post-image-url').value = '';
                fileInput.value = '';
                document.getElementById('file-name').innerText = '';
            } catch (err) { alert("Failed to post: " + err.message); }
            
            btn.innerText = "Post"; btn.disabled = false;
        });

        // ==========================================
        // FEED & PROFILE RENDERING SYSTEM
        // ==========================================
        onValue(ref(db, 'community_posts'), (snapshot) => {
            allPosts = [];
            snapshot.forEach(child => { allPosts.push({ id: child.key, ...child.val() }); });
            if(activeProfileUid) window.renderProfileData(); else window.renderFeed();
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-btn').forEach(b => { b.classList.remove('bg-blue-600', 'text-white'); b.classList.add('bg-gray-200', 'text-gray-700', 'dark:bg-slate-800', 'dark:text-gray-300'); });
                e.target.classList.add('bg-blue-600', 'text-white'); e.target.classList.remove('bg-gray-200', 'text-gray-700', 'dark:bg-slate-800', 'dark:text-gray-300');
                currentFilter = e.target.getAttribute('data-cat');
                window.renderFeed();
            });
        });

        window.renderFeed = () => {
            if(activeProfileUid) return; 
            const feed = document.getElementById('feed');
            feed.innerHTML = '';
            
            const postSearchQ = (document.getElementById('post-search')?.value || '').toLowerCase();
            
            let displayPosts = allPosts.filter(p => {
                if (currentFilter === "My Posts" && (!currentUser || p.authorId !== currentUser.uid)) return false;
                if (currentFilter !== "All" && currentFilter !== "My Posts" && p.category !== currentFilter) return false;
                if (postSearchQ) {
                    const pText = (p.text || '').toLowerCase();
                    const pAuth = (globalUsersCache[p.authorId]?.name || '').toLowerCase();
                    if(!pText.includes(postSearchQ) && !pAuth.includes(postSearchQ)) return false;
                }
                return true;
            });

            displayPosts.sort((a, b) => { if (a.pinned !== b.pinned) return a.pinned ? -1 : 1; return (b.timestamp || 0) - (a.timestamp || 0); });
            if(displayPosts.length === 0) return feed.innerHTML = `<p class="text-center text-gray-400 text-xs py-10">No posts found.</p>`;
            
            displayPosts.forEach(post => { try { feed.appendChild(generatePostHTML(post, 'main')); } catch (e) {} });

            if(!window.initialScrollDone && allPosts.length > 0) {
                const targetPost = new URLSearchParams(window.location.search).get('post');
                if(targetPost) {
                    setTimeout(() => {
                        const el = document.getElementById(`post-main-${targetPost}`);
                        if(el) {
                            el.scrollIntoView({behavior: 'smooth', block: 'center'});
                            el.classList.add('ring-4', 'ring-blue-500', 'transition-all', 'duration-1000');
                            setTimeout(() => el.classList.remove('ring-4', 'ring-blue-500'), 3000);
                        }
                    }, 800);
                    window.initialScrollDone = true;
                }
            }
        };

        window.renderProfileData = () => {
            if(!activeProfileUid) return;
            const uData = globalUsersCache[activeProfileUid] || { name: "Unknown User", pic: window.generateAvatar(activeProfileUid), points: 0 };
            const role = window.getRole(activeProfileUid);
            const isOnline = onlineUsers[activeProfileUid];
            const isBanned = uData.isBanned === true;
            
            const followerIds = uData.followers ? Object.keys(uData.followers) : [];
            const followerCount = followerIds.length;
            let followersHtml = '';
            
            if(followerCount > 0) {
                followersHtml = '<div class="flex space-x-3 overflow-x-auto py-2 scrollbar-hide">';
                followerIds.forEach(fid => {
                    const fData = globalUsersCache[fid] || { name: "User", pic: window.generateAvatar(fid) };
                    followersHtml += `<div class="shrink-0 text-center w-12"><img src="${fData.pic}" class="w-10 h-10 rounded-full object-cover border border-gray-200 dark:border-slate-600 cursor-pointer hover:opacity-80 mx-auto" onclick="window.openProfile('${fid}')" title="${fData.name}"><p class="text-[9px] mt-1 text-gray-500 truncate text-center">${fData.name}</p></div>`;
                });
                followersHtml += '</div>';
            } else {
                followersHtml = '<p class="text-xs text-gray-500">No followers yet.</p>';
            }

            let followBtn = '';
            if(currentUser && currentUser.uid !== activeProfileUid) {
                const isFollowing = globalUsersCache[currentUser.uid]?.following?.[activeProfileUid];
                followBtn = `<button onclick="window.toggleFollow('${activeProfileUid}')" class="mt-3 ${isFollowing ? 'bg-gray-200 text-gray-600 dark:bg-slate-700 dark:text-gray-300' : 'bg-blue-600 text-white'} text-xs font-bold px-5 py-1.5 rounded-full transition shadow-sm">${isFollowing ? 'Following' : 'Follow'}</button>`;
            }

            document.getElementById('profile-header').innerHTML = `
                <div class="flex flex-col items-center bg-white dark:bg-slate-800 p-5 rounded-xl shadow-sm border border-gray-200 dark:border-slate-700 relative">
                    <div class="relative">
                        <img src="${uData.pic}" class="w-20 h-20 rounded-full object-cover border-4 ${isBanned ? 'border-red-500 grayscale' : 'border-gray-50 dark:border-slate-700'}">
                        <div class="absolute bottom-1 right-1 w-4 h-4 rounded-full border-2 border-white dark:border-slate-800 ${isOnline ? 'bg-green-500' : 'bg-gray-400'}"></div>
                    </div>
                    <h2 class="text-xl font-bold dark:text-white mt-2 flex items-center">${uData.name} ${role.badgeHtml}</h2>
                    ${isBanned ? '<span class="bg-red-500 text-white text-[10px] font-bold px-2 py-0.5 rounded uppercase mt-1">Banned</span>' : ''}
                    <p class="text-sm text-gray-500 mt-1"><span class="text-yellow-500">⭐ ${uData.points || 0}</span> • <span class="text-blue-500">👥 ${followerCount}</span> Followers</p>
                    ${followBtn}
                </div>
                <div class="mt-4 bg-white dark:bg-slate-800 p-3 rounded-xl shadow-sm border border-gray-200 dark:border-slate-700">
                    <h3 class="text-xs font-bold text-gray-500 uppercase mb-1">Followers (${followerCount})</h3>
                    ${followersHtml}
                </div>
            `;

            const pFeed = document.getElementById('profile-feed');
            pFeed.innerHTML = '';
            let pPosts = allPosts.filter(p => p.authorId === activeProfileUid);
            pPosts.sort((a, b) => { if (a.pinned !== b.pinned) return a.pinned ? -1 : 1; return (b.timestamp || 0) - (a.timestamp || 0); });
            if(pPosts.length === 0) return pFeed.innerHTML = `<p class="text-center text-gray-500 text-xs py-5">No posts yet.</p>`;
            
            pPosts.forEach(post => { try { pFeed.appendChild(generatePostHTML(post, 'profile')); } catch (e) {} });
        };

        function generatePostHTML(post, prefix) {
            const authorInfo = globalUsersCache[post.authorId] || { name: "Unknown", pic: window.generateAvatar(post.authorId), points: 0 };
            const roleData = window.getRole(post.authorId);
            const followerCount = authorInfo.followers ? Object.keys(authorInfo.followers).length : 0; 
            const timeStr = post.timestamp ? new Date(post.timestamp).toLocaleDateString([], {month:'short', day:'numeric'}) : 'Just now';
            const isBannedAuthor = authorInfo.isBanned === true;
            
            const rxColors = { like: "text-blue-500 bg-blue-50 dark:bg-blue-900/30", fire: "text-red-500 bg-red-50 dark:bg-red-900/30", heart: "text-pink-500 bg-pink-50 dark:bg-pink-900/30", wow: "text-yellow-500 bg-yellow-50 dark:bg-yellow-900/30", sad: "text-indigo-500 bg-indigo-50 dark:bg-indigo-900/30" };
            const rxHover = { like: "hover:text-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/20", fire: "hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20", heart: "hover:text-pink-500 hover:bg-pink-50 dark:hover:bg-pink-900/20", wow: "hover:text-yellow-500 hover:bg-yellow-50 dark:hover:bg-yellow-900/20", sad: "hover:text-indigo-500 hover:bg-indigo-50 dark:hover:bg-indigo-900/20" };

            const rx = post.reactions || {};
            const getRxCount = (type) => (typeof rx[type] === 'object' ? Object.keys(rx[type]).length : 0);
            const getHasReacted = (type) => (currentUser && rx[type] ? !!rx[type][currentUser.uid] : false);
            
            const generateRxBtn = (type, icon) => {
                const baseClass = "flex items-center space-x-1 transition shrink-0 px-2.5 py-1 rounded-full border border-gray-100 dark:border-slate-700/50";
                return `<button onclick="window.react('${post.id}', '${post.authorId}', '${type}')" class="${baseClass} ${getHasReacted(type) ? rxColors[type] : `text-gray-500 bg-gray-50 dark:bg-slate-900 ${rxHover[type]}`}">
                    <i class="fa-solid ${icon}"></i> <span>${getRxCount(type)}</span>
                </button>`;
            };

            const comments = post.comments || {};
            let commentCount = 0; let commentsHtml = '';
            
            for (let cId in comments) {
                commentCount++;
                let c = comments[cId]; if(typeof c !== 'object') continue;
                let cAuth = globalUsersCache[c.uid] || { name: "Unknown", pic: window.generateAvatar(c.uid) };
                
                let repliesHtml = '';
                if(c.replies) {
                    for(let rId in c.replies) {
                        commentCount++;
                        let r = c.replies[rId]; if(typeof r !== 'object') continue;
                        let rAuth = globalUsersCache[r.uid] || { name: "Unknown", pic: window.generateAvatar(r.uid) };
                        repliesHtml += `
                            <div class="flex items-start space-x-2 mt-2 ml-6 reply-line pl-2 relative group">
                                <img src="${rAuth.pic}" class="w-5 h-5 rounded-full object-cover cursor-pointer hover:opacity-80 transition" onclick="window.openProfile('${r.uid}')">
                                <div class="flex-1 bg-gray-50 dark:bg-slate-900/50 p-1.5 rounded-lg border border-gray-100 dark:border-slate-800 text-xs">
                                    <div class="flex justify-between items-start">
                                        <p class="font-bold text-gray-700 dark:text-gray-300 text-[10px] cursor-pointer hover:underline" onclick="window.openProfile('${r.uid}')">${rAuth.name} ${window.getRole(r.uid).badgeHtml}</p>
                                        ${window.canDelete(r.uid) ? `<button onclick="window.deleteItem('community_posts/${post.id}/comments/${cId}/replies/${rId}', '${r.uid}')" class="text-[9px] text-red-400 hidden group-hover:block"><i class="fa-solid fa-trash"></i></button>` : ''}
                                    </div>
                                    <p class="text-gray-800 dark:text-gray-200 mt-0.5 break-words text-[11px] leading-tight">${r.text}</p>
                                </div>
                            </div>
                        `;
                    }
                }

                const cRx = c.reactions || {};
                const getCRxCount = (type) => (typeof cRx[type] === 'object' ? Object.keys(cRx[type]).length : 0);
                const getCHasReacted = (type) => (currentUser && cRx[type] ? !!cRx[type][currentUser.uid] : false);

                const generateCRxBtn = (type, icon) => {
                    const baseClass = "flex items-center space-x-1 transition shrink-0 px-1.5 py-0.5 rounded-full border border-gray-200 dark:border-slate-600/50 text-[10px]";
                    return `<button onclick="window.reactComment('${post.id}', '${cId}', '${c.uid}', '${type}')" class="${baseClass} ${getCHasReacted(type) ? rxColors[type] : `text-gray-400 bg-white dark:bg-slate-800 ${rxHover[type]}`}">
                        <i class="fa-solid ${icon}"></i> <span>${getCRxCount(type)}</span>
                    </button>`;
                };

                const isReplyBoxOpen = window.openReplies.has(cId);
                commentsHtml += `
                    <div class="mt-2 relative group">
                        <div class="flex items-start space-x-2">
                            <img src="${cAuth.pic}" class="w-6 h-6 rounded-full object-cover cursor-pointer hover:opacity-80 transition" onclick="window.openProfile('${c.uid}')">
                            <div class="flex-1 bg-gray-50 dark:bg-slate-900 p-2 rounded-lg border border-gray-100 dark:border-slate-700/50 text-xs">
                                <div class="flex justify-between items-start">
                                    <p class="font-bold text-gray-700 dark:text-gray-300 text-[11px] cursor-pointer hover:underline" onclick="window.openProfile('${c.uid}')">${cAuth.name} ${window.getRole(c.uid).badgeHtml}</p>
                                    ${window.canDelete(c.uid) ? `<button onclick="window.deleteItem('community_posts/${post.id}/comments/${cId}', '${c.uid}')" class="text-[10px] text-red-400 hidden group-hover:block"><i class="fa-solid fa-trash"></i></button>` : ''}
                                </div>
                                <p class="text-gray-800 dark:text-gray-200 mt-0.5 break-words text-xs">${c.text}</p>
                                
                                <div class="flex items-center space-x-1 mt-1.5 overflow-x-auto scrollbar-hide py-0.5">
                                    ${generateCRxBtn('like', 'fa-thumbs-up')}
                                    ${generateCRxBtn('fire', 'fa-fire')}
                                    ${generateCRxBtn('heart', 'fa-heart')}
                                    ${generateCRxBtn('wow', 'fa-face-surprise')}
                                    ${generateCRxBtn('sad', 'fa-face-sad-cry')}
                                    <button onclick="window.toggleReplyBox('${cId}', '${prefix}')" class="text-[10px] text-gray-500 hover:text-blue-500 font-semibold px-2 ml-auto shrink-0">Reply</button>
                                </div>
                            </div>
                        </div>
                        <div id="reply-box-${prefix}-${cId}" class="${isReplyBoxOpen ? 'flex' : 'hidden'} ml-8 mt-1 space-x-1">
                            <input type="text" id="reply-input-${prefix}-${cId}" class="flex-1 bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded text-[10px] px-2 py-1 focus:outline-none dark:text-white" placeholder="Reply to ${cAuth.name}...">
                            <button onclick="window.submitReply('${post.id}', '${cId}', '${prefix}')" class="bg-blue-600 text-white px-2 py-1 rounded text-[10px]"><i class="fa-solid fa-paper-plane"></i></button>
                        </div>
                        ${repliesHtml}
                    </div>
                `;
            }

            const postEl = document.createElement('div');
            postEl.id = `post-${prefix}-${post.id}`;
            postEl.className = `bg-white dark:bg-slate-800 rounded-xl p-3 shadow-sm border ${post.pinned ? 'border-l-4 border-l-green-500 border-y-0 border-r-0' : 'border-gray-100 dark:border-slate-700'} relative mb-3`;
            
            let adminControls = '';
            if(currentUser) {
                if(window.getRole(currentUser.uid).level >= 2) adminControls += `<button onclick="window.togglePin('${post.id}', ${post.pinned})" class="text-gray-400 hover:text-green-500 mr-2 text-xs"><i class="fa-solid fa-thumbtack ${post.pinned ? 'text-green-500' : ''}"></i></button>`;
                if(window.canDelete(post.authorId)) adminControls += `<button onclick="window.deleteItem('community_posts/${post.id}', '${post.authorId}')" class="text-gray-400 hover:text-red-500 text-xs"><i class="fa-solid fa-trash"></i></button>`;
            }

            const isCommentsOpen = window.openComments.has(post.id);

            postEl.innerHTML = `
                <div class="flex justify-between items-start mb-2">
                    <div class="flex items-center space-x-2">
                        <img src="${authorInfo.pic}" class="w-8 h-8 rounded-full object-cover border border-gray-200 dark:border-slate-600 cursor-pointer hover:opacity-80 transition ${isBannedAuthor ? 'grayscale' : ''}" onclick="window.openProfile('${post.authorId}')">
                        <div class="leading-tight">
                            <div class="flex items-center">
                                <h3 class="font-bold text-sm text-gray-900 dark:text-gray-100 cursor-pointer hover:underline ${isBannedAuthor ? 'line-through text-red-500' : ''}" onclick="window.openProfile('${post.authorId}')">${authorInfo.name}</h3>${roleData.badgeHtml} 
                                <span class="text-[9px] text-yellow-500 ml-1">⭐ ${authorInfo.points || 0}</span>
                                <span class="text-[9px] text-blue-500 ml-1 font-bold">👥 ${followerCount}</span>
                            </div>
                            <p class="text-[10px] text-gray-500">${timeStr} • <span class="bg-gray-100 dark:bg-slate-700 px-1 rounded">${post.category}</span></p>
                        </div>
                    </div>
                    <div>${adminControls}</div>
                </div>
                ${post.text ? `<p class="text-sm text-gray-800 dark:text-gray-200 mb-1 whitespace-pre-wrap break-words leading-snug">${post.text}</p>` : ''}
                ${post.image ? `<img src="${post.image}" class="w-full rounded-lg mb-2 object-cover max-h-80 border border-gray-100 dark:border-slate-700 shadow-sm mt-2">` : ''}
                
                <div class="flex items-center space-x-2 overflow-x-auto scrollbar-hide border-t border-gray-100 dark:border-slate-700 pt-2 text-xs pb-1 mt-1">
                    ${generateRxBtn('like', 'fa-thumbs-up')}${generateRxBtn('fire', 'fa-fire')}${generateRxBtn('heart', 'fa-heart')}${generateRxBtn('wow', 'fa-face-surprise')}${generateRxBtn('sad', 'fa-face-sad-cry')}
                    
                    <div class="ml-auto flex items-center space-x-1">
                        <button onclick="window.copyPostLink('${post.id}')" class="flex items-center text-gray-400 hover:text-blue-500 bg-gray-50 dark:bg-slate-900 px-2.5 py-1 rounded-full border border-gray-100 dark:border-slate-700/50 transition">
                            <i class="fa-solid fa-share"></i>
                        </button>
                        <button onclick="window.toggleComments('${post.id}', '${prefix}')" class="flex items-center space-x-1 text-gray-500 hover:text-gray-800 dark:hover:text-gray-200 bg-gray-50 dark:bg-slate-900 px-2.5 py-1 rounded-full border border-gray-100 dark:border-slate-700/50 transition">
                            <i class="fa-regular fa-comment text-sm"></i> <span>${commentCount}</span>
                        </button>
                    </div>
                </div>
                <div id="comments-${prefix}-${post.id}" class="${isCommentsOpen ? '' : 'hidden'} mt-1 border-t border-gray-100 dark:border-slate-700 pt-2">
                    ${commentsHtml}
                    <div class="flex mt-3 items-center space-x-1.5">
                        <input type="text" id="comment-input-${prefix}-${post.id}" class="flex-1 bg-gray-100 dark:bg-slate-900 text-xs rounded-lg px-3 py-1.5 focus:outline-none dark:text-white border border-transparent focus:border-blue-500 shadow-inner" placeholder="Write a comment...">
                        <button onclick="window.submitComment('${post.id}', '${post.authorId}', '${prefix}')" class="bg-blue-600 hover:bg-blue-500 text-white rounded-lg px-4 py-1.5 text-xs font-bold shrink-0 shadow-sm transition">Send</button>
                    </div>
                </div>
            `;
            return postEl;
        }

        // ==========================================
        // ACTION LOGIC 
        // ==========================================
        window.toggleComments = (postId, prefix) => {
            const elMain = document.getElementById(`comments-main-${postId}`);
            const elProf = document.getElementById(`comments-profile-${postId}`);
            if(window.openComments.has(postId)) { 
                window.openComments.delete(postId); 
                if(elMain) elMain.classList.add('hidden'); 
                if(elProf) elProf.classList.add('hidden'); 
            } else { 
                window.openComments.add(postId); 
                if(elMain) elMain.classList.remove('hidden'); 
                if(elProf) elProf.classList.remove('hidden'); 
            }
        };

        window.toggleReplyBox = (cId, prefix) => {
            const elMain = document.getElementById(`reply-box-main-${cId}`);
            const elProf = document.getElementById(`reply-box-profile-${cId}`);
            if(window.openReplies.has(cId)) { 
                window.openReplies.delete(cId); 
                if(elMain) { elMain.classList.add('hidden'); elMain.classList.remove('flex'); } 
                if(elProf) { elProf.classList.add('hidden'); elProf.classList.remove('flex'); } 
            } else { 
                window.openReplies.add(cId); 
                if(elMain) { elMain.classList.remove('hidden'); elMain.classList.add('flex'); } 
                if(elProf) { elProf.classList.remove('hidden'); elProf.classList.add('flex'); } 
            }
        };

        window.react = (postId, postAuthorId, type) => {
            if (!currentUser) return document.getElementById('auth-modal').classList.remove('hidden');
            if (window.checkBan()) return;
            let post = allPosts.find(p => p.id === postId); if(!post) return;
            const hasReacted = post.reactions && post.reactions[type] && post.reactions[type][currentUser.uid];
            if(hasReacted) {
                remove(ref(db, `community_posts/${postId}/reactions/${type}/${currentUser.uid}`));
                if(postAuthorId !== currentUser.uid && postAuthorId !== "undefined") update(ref(db, `users/${postAuthorId}`), { points: increment(-1) });
            } else {
                set(ref(db, `community_posts/${postId}/reactions/${type}/${currentUser.uid}`), true);
                if(postAuthorId !== currentUser.uid && postAuthorId !== "undefined") update(ref(db, `users/${postAuthorId}`), { points: increment(1) });
            }
        };

        window.reactComment = (postId, commentId, commentAuthorId, type) => {
            if (!currentUser) return document.getElementById('auth-modal').classList.remove('hidden');
            if (window.checkBan()) return;
            let post = allPosts.find(p => p.id === postId); if(!post) return;
            let comment = post.comments && post.comments[commentId]; if(!comment) return;
            const hasReacted = comment.reactions && comment.reactions[type] && comment.reactions[type][currentUser.uid];
            if(hasReacted) {
                remove(ref(db, `community_posts/${postId}/comments/${commentId}/reactions/${type}/${currentUser.uid}`));
                if(commentAuthorId !== currentUser.uid && commentAuthorId !== "undefined") update(ref(db, `users/${commentAuthorId}`), { points: increment(-1) });
            } else {
                set(ref(db, `community_posts/${postId}/comments/${commentId}/reactions/${type}/${currentUser.uid}`), true);
                if(commentAuthorId !== currentUser.uid && commentAuthorId !== "undefined") update(ref(db, `users/${commentAuthorId}`), { points: increment(1) });
            }
        };

        window.submitComment = (postId, postAuthorId, prefix) => {
            if (!currentUser) return document.getElementById('auth-modal').classList.remove('hidden');
            if (window.checkBan()) return;
            const input = document.getElementById(`comment-input-${prefix}-${postId}`); 
            const text = input.value.trim(); if (!text) return;
            push(ref(db, `community_posts/${postId}/comments`), { uid: currentUser.uid, text: text, timestamp: Date.now() });
            update(ref(db, `users/${currentUser.uid}`), { points: increment(1) });
            if(currentUser.uid !== postAuthorId && postAuthorId !== "undefined") update(ref(db, `users/${postAuthorId}`), { points: increment(1) });
            input.value = '';
        };

        window.submitReply = (postId, commentId, prefix) => {
            if (!currentUser) return document.getElementById('auth-modal').classList.remove('hidden');
            if (window.checkBan()) return;
            const input = document.getElementById(`reply-input-${prefix}-${commentId}`); 
            const text = input.value.trim(); if (!text) return;
            push(ref(db, `community_posts/${postId}/comments/${commentId}/replies`), { uid: currentUser.uid, text: text, timestamp: Date.now() });
            update(ref(db, `users/${currentUser.uid}`), { points: increment(1) });
            input.value = '';
        };

        window.deleteItem = (dbPath, targetUid) => {
            if(!window.canDelete(targetUid)) return alert("Permission denied");
            if(confirm("Delete this permanently?")) remove(ref(db, dbPath));
        }

        window.togglePin = (postId, currentStatus) => {
            if (currentUser && window.getRole(currentUser.uid).level >= 2) update(ref(db, `community_posts/${postId}`), { pinned: !currentStatus });
        };

        // Members list UI Logic
        window.renderMembers = () => {
            const list = document.getElementById('members-list');
            const searchQuery = (document.getElementById('member-search')?.value || '').toLowerCase();
            list.innerHTML = '';
            
            let usersArray = Object.keys(globalUsersCache).map(uid => ({uid, ...globalUsersCache[uid]})).filter(u => u.name);
            if (searchQuery) usersArray = usersArray.filter(u => u.name.toLowerCase().includes(searchQuery));
            usersArray.sort((a, b) => (b.points || 0) - (a.points || 0));

            const myFollowing = (currentUser && globalUsersCache[currentUser.uid]?.following) || {};
            const isAdmin = currentUser && window.getRole(currentUser.uid).level === 3;

            usersArray.forEach(u => {
                const isOnline = onlineUsers[u.uid];
                const followerCount = u.followers ? Object.keys(u.followers).length : 0;
                
                let followBtn = '';
                if(currentUser && currentUser.uid !== u.uid) {
                    const isFollowing = myFollowing[u.uid];
                    followBtn = `<button onclick="window.toggleFollow('${u.uid}')" class="${isFollowing ? 'bg-gray-200 dark:bg-slate-700 text-gray-600 dark:text-gray-300' : 'bg-blue-600 text-white'} text-[10px] font-bold px-3 py-1 rounded-full transition ml-1 shrink-0">${isFollowing ? 'Following' : 'Follow'}</button>`;
                }

                let modBtn = '';
                if(isAdmin && !ADMIN_UIDS.includes(u.uid)) {
                    modBtn = `<button onclick="window.toggleMod('${u.uid}')" class="${u.isMod ? 'bg-red-500 hover:bg-red-600' : 'bg-purple-500 hover:bg-purple-600'} text-white text-[10px] font-bold px-2 py-1 rounded-full transition ml-1 shrink-0">${u.isMod ? '- Mod' : '+ Mod'}</button>`;
                }

                let banBtn = '';
                if (currentUser && window.canDelete(u.uid) && currentUser.uid !== u.uid) {
                    const isBanned = u.isBanned === true;
                    banBtn = `<button onclick="window.toggleBan('${u.uid}')" class="${isBanned ? 'bg-orange-500 hover:bg-orange-600' : 'bg-red-600 hover:bg-red-700'} text-white text-[10px] font-bold px-2 py-1 rounded-full transition ml-1 shrink-0 shadow-sm">${isBanned ? 'Unban' : 'Ban'}</button>`;
                }

                const el = document.createElement('div');
                el.className = `flex items-center justify-between p-2 bg-gray-50 dark:bg-slate-900 rounded-lg border border-gray-100 dark:border-slate-700/50 ${u.isBanned ? 'opacity-70' : ''}`;
                el.innerHTML = `
                    <div class="flex items-center space-x-3 overflow-hidden">
                        <div class="relative shrink-0">
                            <img src="${u.pic}" class="w-10 h-10 rounded-full object-cover border border-gray-200 dark:border-slate-600 cursor-pointer hover:opacity-80 ${u.isBanned ? 'grayscale' : ''}" onclick="window.openProfile('${u.uid}')">
                            <div class="absolute bottom-0 right-0 w-2.5 h-2.5 rounded-full border border-white dark:border-slate-900 ${isOnline ? 'bg-green-500' : 'bg-gray-400'}"></div>
                        </div>
                        <div class="leading-tight truncate pr-2">
                            <div class="flex items-center">
                                <h3 class="font-bold text-sm text-gray-900 dark:text-white truncate cursor-pointer hover:underline ${u.isBanned ? 'line-through text-red-500' : ''}" onclick="window.openProfile('${u.uid}')">${u.name}</h3>
                                ${window.getRole(u.uid).badgeHtml}
                                ${u.isBanned ? '<span class="bg-red-500 text-white text-[8px] font-bold px-1 ml-1 rounded">BANNED</span>' : ''}
                            </div>
                            <p class="text-[10px] text-gray-500 mt-0.5"><span class="text-yellow-600 dark:text-yellow-500">⭐ ${u.points || 0}</span> • <span class="text-blue-500">👥 ${followerCount}</span></p>
                        </div>
                    </div>
                    <div class="flex items-center shrink-0">${banBtn}${modBtn}${followBtn}</div>
                `;
                list.appendChild(el);
            });
            if(usersArray.length === 0) list.innerHTML = `<p class="text-center text-gray-500 text-sm">No members found.</p>`;
        };

        window.toggleMod = (targetUid) => {
            if(!currentUser || window.getRole(currentUser.uid).level !== 3) return alert("Only Admins can do this.");
            const isCurrentlyMod = globalUsersCache[targetUid]?.isMod === true;
            update(ref(db, `users/${targetUid}`), { isMod: !isCurrentlyMod });
        };

        window.toggleBan = (targetUid) => {
            if(!window.canDelete(targetUid)) return alert("Permission denied. You cannot ban this user.");
            const isBanned = globalUsersCache[targetUid]?.isBanned === true;
            if(confirm(isBanned ? "Unban this user? They will be able to post and interact again." : "Ban this user? They will be locked out from posting, commenting, and reacting.")) {
                update(ref(db, `users/${targetUid}`), { isBanned: !isBanned });
            }
        };

        window.toggleFollow = (targetUid) => {
            if(!currentUser) return document.getElementById('auth-modal').classList.remove('hidden');
            if (window.checkBan()) return;
            const isFollowing = globalUsersCache[currentUser.uid]?.following?.[targetUid];
            if(isFollowing) {
                remove(ref(db, `users/${currentUser.uid}/following/${targetUid}`));
                remove(ref(db, `users/${targetUid}/followers/${currentUser.uid}`));
            } else {
                set(ref(db, `users/${currentUser.uid}/following/${targetUid}`), true);
                set(ref(db, `users/${targetUid}/followers/${currentUser.uid}`), true);
            }
        };
    </script>
</body>
</html>
